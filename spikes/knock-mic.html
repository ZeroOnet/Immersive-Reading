<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Spike P5 · Knock to Open</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    background: radial-gradient(120% 90% at 50% 0%, #20160f, #0a0712);
    color:#f0e9df; font-family:'Iowan Old Style', Georgia, serif;
  }
  .card { width:min(560px,100%); text-align:center }
  h1 { font:600 14px/1.4 ui-sans-serif,system-ui; letter-spacing:.3em; text-transform:uppercase; color:#e0b483; opacity:.85 }
  .hint { font-size: clamp(1.3rem,5vw,1.8rem); margin:14px 0 22px }
  .door {
    width:160px; height:220px; margin:0 auto; border-radius:8px 8px 0 0;
    background:linear-gradient(#3a2a1c,#241710); box-shadow: inset 0 0 0 3px #5c4329, 0 10px 40px #0008;
    position:relative; transition: transform .4s;
  }
  .door::after { content:""; position:absolute; right:14px; top:50%; width:10px; height:10px; border-radius:50%; background:#e0b483 }
  .door.knock { animation: shake .25s }
  @keyframes shake { 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .door.open { transform: perspective(600px) rotateY(-72deg); transform-origin:left }
  .meter { height:10px; border-radius:999px; background:#2a2018; overflow:hidden; margin:22px 0 6px }
  .meter i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#e0b483,#ff7b4a) }
  .thr { font:400 12px/1.5 ui-sans-serif; color:#9a8a76 }
  .dots { font-size:28px; letter-spacing:.4em; margin:14px 0; min-height:1.2em }
  .row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:8px }
  button { font:600 14px/1 ui-sans-serif; color:#0a0712; background:#e0b483; border:0; padding:12px 16px; border-radius:999px; cursor:pointer }
  button.ghost { background:transparent; color:#e0b483; box-shadow: inset 0 0 0 1px #5c4329 }
  button:active{ transform:scale(.96) }
  input[type=range]{ width:200px }
  .status{ font:400 13px/1.5 ui-sans-serif; color:#9a8a76; margin-top:10px; min-height:2.4em }
  .ok{ color:#7bffce }
</style>
</head>
<body>
<div class="card">
  <h1>Spike · Knock to Open</h1>
  <div class="hint">Knock <b>three times</b> to open the hidden door.</div>
  <div id="door" class="door"></div>
  <div class="dots" id="dots"></div>
  <div class="meter"><i id="bar"></i></div>
  <div class="thr">sensitivity (threshold): <input id="thr" type="range" min="0.02" max="0.4" step="0.01" value="0.12" /> <span id="thrv">0.12</span></div>
  <div class="row">
    <button id="start">🎙 Enable mic</button>
    <button id="demo" class="ghost">Knock for me (demo)</button>
    <button id="reset" class="ghost">Reset</button>
  </div>
  <div id="status" class="status">Tip: only volume peaks are detected — no sound classification, so it's hard to break.</div>
</div>
<script>
const doorEl = document.getElementById("door");
const barEl = document.getElementById("bar");
const dotsEl = document.getElementById("dots");
const statusEl = document.getElementById("status");
const thrEl = document.getElementById("thr");
const thrv = document.getElementById("thrv");
let threshold = parseFloat(thrEl.value);
thrEl.oninput = () => { threshold = parseFloat(thrEl.value); thrv.textContent = threshold.toFixed(2); };

let knocks = 0, opened = false, lastKnock = 0, armed = true;
const REFRACTORY = 220; // ms — ignore peaks right after a knock (one knock = one count)

function registerKnock(now) {
  if (opened) return;
  if (now - lastKnock < REFRACTORY) return;
  lastKnock = now;
  knocks++;
  dotsEl.textContent = "●".repeat(knocks) + "○".repeat(Math.max(0, 3 - knocks));
  doorEl.classList.remove("knock"); void doorEl.offsetWidth; doorEl.classList.add("knock");
  if (knocks >= 3) open();
}
function open() {
  opened = true;
  doorEl.classList.add("open");
  statusEl.innerHTML = '<span class="ok">✅ The door opens — hidden passage revealed.</span>';
}
function reset() {
  knocks = 0; opened = false; doorEl.classList.remove("open");
  dotsEl.textContent = "○○○"; statusEl.textContent = "Reset. Knock three times.";
}
document.getElementById("reset").onclick = reset;
document.getElementById("demo").onclick = () => {
  reset();
  [0, 350, 700].forEach((d) => setTimeout(() => registerKnock(performance.now()), d));
};
reset();

// ---- mic RMS peak detection ----
document.getElementById("start").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    const buf = new Float32Array(analyser.fftSize);
    statusEl.textContent = "🎙 Listening for knocks…";
    const loop = () => {
      analyser.getFloatTimeDomainData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
      const rms = Math.sqrt(sum / buf.length);
      barEl.style.width = Math.min(100, rms * 300) + "%";
      if (rms > threshold) registerKnock(performance.now());
      requestAnimationFrame(loop);
    };
    loop();
  } catch (e) {
    statusEl.textContent = "Mic blocked/failed (" + e.name + "). Use the demo button — that's the on-stage fallback.";
  }
};
</script>
</body>
</html>
