<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Spike P2 · Text → Particles</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:#080611; color:#e9e4f5; font-family: ui-sans-serif, system-ui; overflow:hidden; }
  #c { display:block; width:100vw; height:100vh; touch-action:none; }
  .ui { position:fixed; left:0; right:0; bottom:0; padding:14px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
        background:linear-gradient(transparent, #080611cc 40%); }
  button { font:600 13px/1 ui-sans-serif; color:#0a0712; background:#b9a6ff; border:0; padding:11px 14px; border-radius:999px; cursor:pointer }
  button.on { background:#7bffce }
  button:active{ transform:scale(.96) }
  .tag { position:fixed; top:14px; left:14px; font:600 12px/1.4 ui-sans-serif; letter-spacing:.25em; text-transform:uppercase; color:#8c84a3 }
  .tip { position:fixed; top:14px; right:14px; font:400 12px/1.4 ui-sans-serif; color:#6a6385; text-align:right; max-width:50vw }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tag">Spike · Text → Particles</div>
<div class="tip" id="tip">one engine = many effects</div>
<div class="ui">
  <button data-m="assemble" class="on">Assemble</button>
  <button data-m="wind">Wind</button>
  <button data-m="collapse">Collapse → pile</button>
  <button data-m="gravity">Gravity (drag)</button>
</div>
<script>
const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const tip = document.getElementById("tip");
const DPR = Math.min(devicePixelRatio || 1, 2);
let W, H;
function resize() { W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR; ctx.setTransform(DPR,0,0,DPR,0,0); build(); }
addEventListener("resize", resize);

// ---- sample a word into target points ----
let particles = [];
function build() {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");
  const text = "MAGIC";
  const fs = Math.min(innerWidth * 0.28, 240);
  octx.font = `900 ${fs}px Georgia, serif`;
  const w = Math.ceil(octx.measureText(text).width);
  const h = Math.ceil(fs * 1.3);
  off.width = w; off.height = h;
  octx.font = `900 ${fs}px Georgia, serif`;
  octx.fillStyle = "#fff"; octx.textBaseline = "middle";
  octx.fillText(text, 0, h / 2);
  const data = octx.getImageData(0, 0, w, h).data;
  const step = Math.max(3, Math.round(fs / 36)); // density vs perf
  const ox = innerWidth / 2 - w / 2, oy = innerHeight / 2 - h / 2;
  const pts = [];
  for (let y = 0; y < h; y += step)
    for (let x = 0; x < w; x += step)
      if (data[(y * w + x) * 4 + 3] > 128) pts.push({ hx: ox + x, hy: oy + y });
  // keep particle identity stable across rebuilds when possible
  particles = pts.map((p, i) => {
    const old = particles[i];
    return { hx: p.hx, hy: p.hy,
      x: old ? old.x : innerWidth/2 + (Math.random()-.5)*innerWidth,
      y: old ? old.y : innerHeight/2 + (Math.random()-.5)*innerHeight,
      vx: 0, vy: 0, seed: Math.random()*6.28, settled: false };
  });
}

// ---- modes ----
let mode = "assemble";
document.querySelectorAll("button[data-m]").forEach((b) => b.onclick = () => {
  mode = b.dataset.m;
  document.querySelectorAll("button[data-m]").forEach(x => x.classList.toggle("on", x === b));
  for (const p of particles) p.settled = false;
  tip.textContent = ({assemble:"letters fly home", wind:"sway like reeds in wind",
    collapse:"text collapses into a mountain", gravity:"drag to pull the text"})[mode];
});

// pointer = gravity attractor
let pointer = { x: -1, y: -1, active: false };
const setP = (e) => { const t = e.touches ? e.touches[0] : e; pointer.x = t.clientX; pointer.y = t.clientY; pointer.active = true; };
cv.addEventListener("pointermove", setP);
cv.addEventListener("pointerdown", setP);
addEventListener("pointerup", () => pointer.active = false);

const FLOOR = () => innerHeight - 40;
function moundY(x) { // triangular mountain centered on screen
  const cx = innerWidth / 2, halfW = innerWidth * 0.34, peak = innerHeight * 0.34;
  const d = Math.abs(x - cx);
  return FLOOR() - Math.max(0, peak * (1 - d / halfW));
}

let t = 0;
function frame() {
  t += 0.016;
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  for (const p of particles) {
    if (mode === "assemble") {
      p.x += (p.hx - p.x) * 0.12; p.y += (p.hy - p.y) * 0.12;
    } else if (mode === "wind") {
      const sway = Math.sin(t * 1.6 + p.hy * 0.02 + p.seed) * 14 * (1 + (innerHeight - p.hy)/innerHeight);
      const tx = p.hx + sway, ty = p.hy + Math.cos(t + p.seed) * 3;
      p.x += (tx - p.x) * 0.2; p.y += (ty - p.y) * 0.2;
    } else if (mode === "collapse") {
      p.vy += 0.6; p.x += p.vx; p.y += p.vy;
      p.vx += (innerWidth/2 - p.x) * 0.0002; // drift toward peak
      const my = moundY(p.x);
      if (p.y >= my) { p.y = my; p.vy *= -0.18; p.vx *= 0.7; if (Math.abs(p.vy) < 0.6) { p.vy = 0; } }
    } else if (mode === "gravity") {
      if (pointer.active) {
        const dx = pointer.x - p.x, dy = pointer.y - p.y;
        const d2 = dx*dx + dy*dy + 400;
        const f = 1400 / d2;
        p.vx += dx * f * 0.02; p.vy += dy * f * 0.02;
      }
      p.vx += (p.hx - p.x) * 0.004; p.vy += (p.hy - p.y) * 0.004; // spring home
      p.vx *= 0.9; p.vy *= 0.9; p.x += p.vx; p.y += p.vy;
    }
    const lit = mode === "gravity" && pointer.active;
    ctx.fillStyle = lit ? "#7bffce" : "#b9a6ff";
    ctx.globalAlpha = 0.9;
    ctx.fillRect(p.x, p.y, 2.2, 2.2);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}
resize();
frame();
</script>
</body>
</html>
